<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Attendance System | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-gradient-to-br from-teal-50 to-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-8">

    <!-- Logo / Title -->
    <div class="text-center mb-6">
      <div class="text-5xl mb-3">🎓</div>
      <h1 class="text-3xl font-bold text-gray-800 mb-1">Smart Attendance</h1>
      <p class="text-sm text-gray-400">SRM Ramapuram — Secure Campus System</p>
    </div>

    <!-- Error message (shown on bad login) -->
    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 mb-5 text-center font-semibold">
      ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" class="space-y-5">

      <!-- User ID -->
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">User ID</label>
        <input name="user_id" required
          class="w-full px-4 py-2.5 border border-gray-200 rounded-xl
                 focus:ring-2 focus:ring-teal-400 outline-none text-gray-700"
          placeholder="Enter your ID (e.g. RA2311008020101)">
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full px-4 py-2.5 border border-gray-200 rounded-xl
                 focus:ring-2 focus:ring-teal-400 outline-none text-gray-700"
          placeholder="Enter your password">
      </div>

      <!-- Role — now includes Admin -->
      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">Role</label>
        <select name="role"
          class="w-full px-4 py-2.5 border border-gray-200 rounded-xl
                 focus:ring-2 focus:ring-teal-400 outline-none text-gray-700 bg-white">
          <option value="Student">🎓 Student</option>
          <option value="Faculty">👩‍🏫 Faculty</option>
          <option value="Admin">🛡️ Admin</option>
        </select>
      </div>

      <!-- Login Button -->
      <button type="submit"
        class="w-full bg-teal-600 text-white py-3 rounded-xl font-semibold
               hover:bg-teal-700 active:scale-95 transition text-lg">
        Login →
      </button>

    </form>

    <p class="text-xs text-gray-300 text-center mt-6">
      Smart Attendance System © SRM Ramapuram
    </p>

  </div>

</body>
</html>
